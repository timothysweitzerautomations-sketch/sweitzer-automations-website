    <circle cx="24" cy="24" r="3.25" fill="#2563eb"/>
    <circle cx="24" cy="14.5" r="2" fill="#0f172a" opacity="0.85"/>
    <circle cx="16.8" cy="29.2" r="2" fill="#0f172a" opacity="0.85"/>
