<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" fill="none">
  <title>Sweitzer Automations  for light backgrounds</title>
  <rect width="300" height="64" fill="#ffffff"/>
  <defs>
    <linearGradient id="ll-edge" x1="6" y1="8" x2="42" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
